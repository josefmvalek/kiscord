<!doctype html>
<html lang="cs">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kiscord</title>

  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/webp" href="/img/app/czippel2_kytka-modified.webp" />
  <link rel="manifest" href="/manifest.json" />
  <!-- Performance Optimization: Preconnect to critical domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://nnrorazsiyiedwomgidf.supabase.co">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">

  <script>
    window.tailwindConfig = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = window.tailwindConfig;
  </script>
  
  
  <!-- Math Support: KaTeX loaded dynamically in modules -->

  <link rel="stylesheet" href="/style.css" />
  
  
  <!-- Markdown & Highlighting loaded dynamically in modules -->
  
  <!-- Critical CSS: Login screen styles for instant rendering -->
  <style>
    body { background-color: #36393f; margin: 0; padding: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
    #login-screen { position: fixed; inset: 0; z-index: 200; background-color: #202225; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .login-gradient { position: absolute; inset: 0; background: linear-gradient(to bottom right, rgba(88, 101, 242, 0.2), rgba(235, 69, 158, 0.2)); z-index: 0; }
    .login-card { position: relative; z-index: 10; width: 100%; max-width: 448px; background-color: #36393f; border-radius: 0.75rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid #202225; padding: 2rem; }
    #app-interface { opacity: 0; transition: opacity 1s; pointer-events: none; }
    #app-interface.show { opacity: 1 !important; pointer-events: auto !important; }
  </style>
  <meta name="theme-color" content="#202225" />
  <link rel="apple-touch-icon" href="img/app/jozka_profilovka.jpg" />
  
  <!-- Fonts (Critical) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- Secondary Fonts (Non-blocking) -->
  <link href="https://fonts.googleapis.com/css2?family=Consolas:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />

  <!-- Early Theme Init to prevent flash -->
  <script>
    (function () {
      // 1. Theme Init
      const saved = localStorage.getItem('klarka_theme') || 'default';
      if (saved !== 'default') document.documentElement.classList.add('theme-' + saved);

      // 2. Pre-emptive Auth Check: Prevents login screen flicker for logged-in users
      window.addEventListener('DOMContentLoaded', () => {
        let hasSession = false;
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith('sb-') && key.endsWith('-auth-token')) {
            hasSession = true;
            break;
          }
        }
        if (!hasSession) {
          const loginScreen = document.getElementById('login-screen');
          if (loginScreen) loginScreen.style.display = 'flex';
        }
      });
    })();
  </script>
</head>

<body class="h-screen w-screen flex flex-col md:flex-row text-sm transition-colors duration-300">
  <!-- ========== LOGIN SCREEN ========== -->
  <div id="login-screen" class="fixed inset-0 z-[200] bg-[#202225] flex items-center justify-center p-4">
    <div class="login-gradient z-0"></div>
    <div class="login-card animate-fade-in">
      <div class="text-6xl text-center mb-6">🦝</div>
      <h2 class="text-2xl font-bold text-white text-center mb-2">Vítej v Kiscordu</h2>
      <p class="text-gray-400 text-center mb-8 text-sm">Zadej své údaje pro vstup do našeho světa.</p>

      <form onsubmit="event.preventDefault(); window.handleLogin(this)" class="space-y-4">
        <div>
          <label class="block text-[#b9bbbe] text-[10px] font-bold uppercase mb-1">E-mail</label>
          <input type="email" name="email" required
            class="w-full bg-[#202225] text-white p-3 rounded border border-[#202225] outline-none focus:border-[#5865F2] transition">
        </div>
        <div>
          <label class="block text-[#b9bbbe] text-[10px] font-bold uppercase mb-1">Heslo</label>
          <input type="password" name="password" required
            class="w-full bg-[#202225] text-white p-3 rounded border border-[#202225] outline-none focus:border-[#5865F2] transition">
        </div>
        <button type="submit"
          class="w-full bg-[#5865F2] hover:bg-[#4752c4] text-white py-3 rounded font-bold transition shadow-lg mt-4 flex items-center justify-center gap-2">
          <span>Přihlásit se</span>
          <i class="fas fa-arrow-right text-xs"></i>
        </button>
        <p id="login-error" class="hidden text-red-400 text-center text-xs mt-4"></p>
      </form>
    </div>
  </div>

  <!-- ========== MAIN APP ========== -->
  <div id="app-interface" class="flex w-full h-full transition-opacity duration-1000 opacity-0">
    <!-- SERVER LIST -->
    <div id="sidebar-wrapper"
      class="fixed inset-y-0 left-0 z-50 flex h-full transition-transform duration-300 transform -translate-x-full md:relative md:translate-x-0 shadow-2xl md:shadow-none">
      <div
        class="bg-[var(--bg-tertiary)] w-[72px] flex flex-col items-center py-3 gap-2 flex-shrink-0 border-r border-[var(--bg-tertiary)]">
        <div
          class="w-12 h-12 bg-[var(--bg-primary)] rounded-full hover:rounded-2xl hover:bg-[var(--blurple)] transition-all cursor-pointer flex items-center justify-center text-[var(--text-normal)] hover:text-white mb-2">
          <i class="fab fa-discord text-xl"></i>
        </div>
        <div class="w-8 h-[2px] bg-[var(--bg-primary)] rounded mb-2"></div>
        <div
          class="w-12 h-12 bg-gradient-to-br from-blue-500 to-purple-500 rounded-2xl cursor-pointer flex items-center justify-center overflow-hidden">
          <div
            class="w-12 h-12 rounded-2xl cursor-pointer flex items-center justify-center overflow-hidden shadow-lg group transition-all duration-200">
            <img src="img/app/czippel2_vanoce.webp" alt="K&T Server" class="w-full h-full object-cover" loading="lazy" />
          </div>
        </div>
      </div>

      <div class="bg-[var(--bg-secondary)] w-60 flex flex-col flex-shrink-0 border-r border-[var(--bg-tertiary)]">
        <div
          class="h-12 border-b border-[var(--bg-tertiary)] flex items-center justify-between px-4 font-bold text-[var(--text-header)] hover:bg-[#34373c] cursor-pointer transition">
          <span class="truncate">Kiscord 🦝🤍🦉</span>
          <button onclick="toggleValentineMode()" class="text-xs hover:text-[#eb459e] transition p-1"
            title="Přepnout Valentýnský Theme">
            <i class="fas fa-heart"></i>
          </button>
        </div>
        <div class="flex-1 overflow-y-auto py-3 custom-scrollbar">
          <div id="channels-container"></div>
        </div>
        <div
          class="h-[52px] bg-[var(--bg-tertiary)] flex items-center px-2 w-full cursor-pointer hover:bg-[#34373c] transition select-none"
          onclick="toggleUserPopout()">
          <div class="relative w-8 h-8 mr-2 group">
            <img id="sidebar-user-avatar" src="img/app/klarka_profilovka.webp" alt="Avatar"
              class="w-8 h-8 rounded-full object-cover" loading="lazy" />
            <div
              class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-[var(--green)] rounded-full border-2 border-[#292b2f]">
            </div>
          </div>
          <div class="flex-1 overflow-hidden">
            <div id="sidebar-user-name" class="text-[var(--text-header)] text-xs font-bold truncate">&nbsp;</div>
            <div class="text-[var(--interactive-normal)] text-[10px] truncate">
              #1337 • <span id="user-status">Online</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="mobile-overlay" onclick="toggleMobileMenu()"
      class="fixed inset-0 bg-black/60 z-40 hidden md:hidden backdrop-blur-sm transition-opacity"></div>

    <!-- MAIN CONTENT AREA -->
    <div class="bg-[var(--bg-primary)] flex-1 flex flex-col min-w-0 relative z-10 overflow-hidden h-screen">

      <div
        class="h-12 border-b border-[var(--bg-tertiary)] flex items-center px-4 shadow-sm z-20 bg-[var(--bg-primary)] flex-shrink-0">
        <button onclick="toggleMobileMenu()"
          class="md:hidden mr-4 text-[var(--interactive-normal)] hover:text-white focus:outline-none">
          <i class="fas fa-bars text-xl"></i>
        </button>

        <i id="channel-icon" class="fas fa-hashtag text-gray-500 text-xl mr-2"></i>
        <span id="channel-name" class="font-bold text-[var(--text-header)] mr-4 truncate">&nbsp;</span>
        <span id="channel-desc" class="text-xs text-[var(--interactive-normal)] truncate hidden md:block">&nbsp;</span>
        <div class="ml-auto flex items-center gap-4 text-[var(--interactive-normal)]">
          <div class="bg-[var(--bg-tertiary)] px-2 py-1 rounded text-xs flex items-center gap-2 w-32 md:w-48">
            <input type="text" placeholder="Hledat..." class="bg-transparent text-white focus:outline-none w-full"
              id="search-input" />
            <i class="fas fa-search text-xs"></i>
          </div>
        </div>
      </div>

      <!-- Content Container -->
      <div id="messages-container"
        class="flex-1 overflow-y-auto min-h-0 px-0 py-0 custom-scrollbar flex flex-col bg-[#36393f] relative"></div>
    </div>

    <!-- MEMBER LIST -->
    <div
      class="w-60 bg-[var(--bg-secondary)] hidden lg:flex flex-col p-3 flex-shrink-0 border-l border-[var(--bg-tertiary)] z-20">
      <h3 class="text-xs font-bold text-[#8e9297] uppercase mb-2 px-2">
        ONLINE — 2
      </h3>
      <div class="flex items-center gap-3 px-2 py-1.5 rounded hover:bg-[var(--bg-primary)] cursor-pointer group">
        <div class="relative">
          <img src="img/app/jozka_profilovka.jpg" alt="Jožka" class="w-8 h-8 rounded-full object-cover"
            loading="lazy" />
          <div
            class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-[var(--green)] rounded-full border-2 border-[#2f3136]">
          </div>
        </div>
        <div>
          <div class="font-bold text-gray-200 text-sm">Jožka</div>
          <div class="text-xs text-gray-400">
            Hraje Tetris <span class="text-[var(--pink)]">🧩</span>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-3 px-2 py-1.5 rounded hover:bg-[var(--bg-primary)] cursor-pointer group mt-1">
        <div class="relative">
          <img src="img/app/klarka_profilovka.webp" alt="Klárka" class="w-8 h-8 rounded-full object-cover" />
          <div
            class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-[var(--green)] rounded-full border-2 border-[#2f3136]">
          </div>
        </div>
        <div>
          <div class="font-bold text-gray-200 text-sm">Klárka</div>
          <div class="text-xs text-gray-400">Vrchní Fact-Checker</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== MODALS ========== -->

  <!-- Non-critical scripts/styles loaded at the end -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'" />
  
  <script src="js/debug.js"></script>
  <script src="data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script type="module" src="/js/main.js?v=19"></script>

</body>
</html>
